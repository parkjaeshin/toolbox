<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolbox</title>
    <meta name="description" content="내가 불편해서 만든 웹페이지들.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <header>
        <h1>이미지 편집 도구를 모아둔 웹 에디터</h1>
        <p>내가 불편해서 만든 웹페이지들.</p>
    </header>

    <main class="container">
        <div class="grid">
            <!-- 다중PNG변환기 -->
            <a href="다중PNG시트변환기/index.html" class="card" id="card-png-merge">
                <div class="card-image">🖼️</div>
                <div class="card-content">
                    <h2 class="card-title">PNG 병합하기</h2>
                    <p class="card-description">png 여러개를 한 png로 합치기.</p>
                </div>
            </a>

            <!-- 애니메이션시트편집기 -->
            <a href="애니메이션시트편집기/index.html" class="card" id="card-anim-sheet">
                <div class="card-image">🎬</div>
                <div class="card-content">
                    <h2 class="card-title">스프라이트 시트 편집기</h2>
                    <p class="card-description">gif를 애니메이션 시트png로 변환하기.</p>
                </div>
            </a>

            <!-- PNG커터 -->
            <a href="PNG커터/index.html" class="card" id="card-png-cutter">
                <div class="card-image">✂️</div>
                <div class="card-content">
                    <h2 class="card-title">PNG 자르기</h2>
                    <p class="card-description">PNG를 일정 크기로 자르기.</p>
                </div>
            </a>

            <!-- 확장자변환기 -->
            <a href="확장자변환기/index.html" class="card" id="card-png-cutter">
                <div class="card-image">✂️</div>
                <div class="card-content">
                    <h2 class="card-title">확장자 변환기</h2>
                    <p class="card-description">이미지 확장자를 변환하기.</p>
                </div>
            </a>

            <!-- Placeholder for future projects -->
            <div class="card card--placeholder" id="card-coming-soon">
                <div class="card-image">✦</div>
                <div class="card-content">
                    <h2 class="card-title">Coming Soon</h2>
                    <p class="card-description">제작자가 불편한 점이 생기면 만들어질 예정.</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Toolbox. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
