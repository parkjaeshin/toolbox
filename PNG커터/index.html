<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG Cropper Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Main Application Area -->
        <main class="cropper-app">
            <header>
                <h1>PNG Cropper</h1>
                <div class="controls">
                    <input type="file" id="imageInput" accept="image/png">
                    <!-- Custom styling over the generic input -->
                    <label for="imageInput" class="btn">Upload PNG</label>
                    <button id="resetBtn" class="btn btn-secondary">Reset</button>
                    <!-- Trigger manual crop (optional, inputManager might auto-crop on mouseup) -->
                    <!-- <button id="cropBtn" class="btn btn-primary">Crop Selection</button> -->
                </div>
            </header>
            
            <div class="canvas-container">
                <canvas id="mainCanvas"></canvas>
            </div>
        </main>
        
        <!-- Results Sidebar/Bottom -->
        <aside class="results-panel">
            <h2>Cropped Results</h2>
            <div id="croppedImagesContainer" class="results-grid">
                <!-- Cropped images will be appended here by general.js -->
            </div>
        </aside>
    </div>

    <!-- Scripts -->
    <script src="general.js"></script>
    <script src="inputManager.js"></script>
</body>
</html>
