<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG Image Cropper</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>PNG Cropper</h1>
            <p>Upload an image, drag to select an area, and save</p>
        </header>

        <!-- Main Content Layout -->
        <main class="main-content">
            <!-- Left Column: Upload & Canvas -->
            <div class="workspace-area">

                <!-- Upload Zone (Hidden once image is loaded) -->
                <div id="uploadZone" class="upload-zone">
                    <div class="upload-content">
                        <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <p class="upload-text">Drag & Drop your PNG here</p>
                        <span class="upload-or">or</span>
                        <label for="fileInput" class="btn btn-primary">Browse Files</label>
                        <input type="file" id="fileInput" accept="image/png" class="hidden-input">
                    </div>
                </div>

                <!-- Canvas Wrapper (Visible after upload) -->
                <div id="canvasZone" class="canvas-zone hidden">
                    <div class="canvas-header">
                        <span class="instruction">Drag the box to crop</span>
                        <div class="box-controls">
                            <label>W: <input type="number" id="cropWidthInput" value="100" min="1"></label>
                            <label>H: <input type="number" id="cropHeightInput" value="100" min="1"></label>
                        </div>
                        <button id="resetImageBtn" class="btn btn-icon" title="Reset Image">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <polyline points="1 4 1 10 7 10"></polyline>
                                <polyline points="23 20 23 14 17 14"></polyline>
                                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
                            </svg>
                            Reset
                        </button>
                    </div>

                    <!-- We use a wrapper to handle absolute positioning of dynamic overlays if needed -->
                    <div class="canvas-wrapper">
                        <canvas id="mainCanvas"></canvas>
                    </div>
                </div>

            </div>

            <!-- Center Action Button -->
            <div class="action-divider hidden" id="cropActionDivider">
                <button id="doCropBtn" class="btn btn-primary action-arrow-btn" title="Crop & Add to Right">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>

            <!-- Right Column: Results -->
            <div class="results-area">
                <div class="results-header">
                    <h2>Cropped Items</h2>
                    <span id="itemsCount" class="badge">0</span>
                </div>

                <!-- Scrollable list of cropped images -->
                <div id="resultsList" class="results-list">
                    <!-- Items will be injected here by general.js -->
                    <div class="empty-state" id="emptyResultsState">
                        <p>Your cropped images will appear here.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- App Logic Scripts -->
    <script src="general.js"></script>
    <script src="inputManager.js"></script>
</body>

</html>
